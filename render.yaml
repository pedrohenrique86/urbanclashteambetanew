services:
  # BACKEND SERVICE
  - type: web
    name: urbanclash-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run migrate:up:prod
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24
      - key: DATABASE_URL
        fromDatabase:
          name: urbanclash-db
          property: connectionString
      - fromGroup: urbanclash-secrets

  # FRONTEND SERVICE
  - type: static
    name: urbanclash-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://urbanclash-backend.onrender.com # Ajustar se o nome do host for diferente
      - key: NODE_VERSION
        value: 24
      - fromGroup: urbanclash-secrets

databases:
  - name: urbanclash-db
    plan: free
