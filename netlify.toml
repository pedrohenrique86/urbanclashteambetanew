[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Configuração para Single Page Applications
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redirecionamento para o backend local
[[redirects]]
  from = "/api/*"
  to = "http://localhost:3001/api/:splat"
  status = 200
  force = true