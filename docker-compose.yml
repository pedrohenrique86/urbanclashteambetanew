services:
  redis:
    image: redis:7
    container_name: urbanclash_redis
    ports:
      - "6379:6379"
    networks:
      - urbanclash_network
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - 64mb
      - --aof-use-rdb-preamble
      - "yes"
      - --no-appendfsync-on-rewrite
      - "yes"
      - --aof-load-truncated
      - "yes"
      - --maxmemory
      - 500mb
      - --maxmemory-policy
      - noeviction

