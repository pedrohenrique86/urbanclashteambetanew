map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Mapeamento robusto de CORS
map $http_origin $cors_origin {
    default "";
    "~^https?://(www\.)?urbanclashteam\.com$" "$http_origin";
    "~^http://localhost:[0-9]+$" "$http_origin";
}

upstream urbanclash_backend {
    server 127.0.0.1:3002;
    keepalive 64;
}

server {
    listen 80;
    server_name api.urbanclashteam.com;

    if ($host = api.urbanclashteam.com) {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 404;
}

server {
    listen 443 ssl;
    server_name api.urbanclashteam.com;

    ssl_certificate     /etc/letsencrypt/live/api.urbanclashteam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.urbanclashteam.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/urbanclash_access.log;
    error_log  /var/log/nginx/urbanclash_error.log warn;

    client_max_body_size 10m;

    # Socket.IO
    location /socket.io/ {
        proxy_pass         http://urbanclash_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_buffering off;
    }

    # API com CORS robusto via Map
    location /api/ {
        # Resposta imediata para OPTIONS (Preflight)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, If-None-Match, Cache-Control, Pragma, X-Requested-With, Accept, Origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Adiciona headers de CORS se a origem for válida
        add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Vary' 'Origin' always;

        proxy_pass         http://urbanclash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Configurações essenciais para Ranking/SSE (Streaming)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }

    location / {
        proxy_pass         http://urbanclash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

