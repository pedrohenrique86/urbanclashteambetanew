map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream urbanclash_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP → HTTPS redirect (mantido pelo Certbot)
server {
    listen 80;
    server_name api.urbanclashteam.com;

    if ($host = api.urbanclashteam.com) {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 404;
}

# HTTPS principal
server {
    listen 443 ssl;
    server_name api.urbanclashteam.com;

    # SSL gerenciado pelo Certbot — não alterar
    ssl_certificate     /etc/letsencrypt/live/api.urbanclashteam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.urbanclashteam.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/urbanclash_access.log;
    error_log  /var/log/nginx/urbanclash_error.log warn;

    client_max_body_size 10m;

    # Socket.IO — WebSocket puro
    location /socket.io/ {
        proxy_pass         http://urbanclash_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout 10s;
        proxy_buffering off;
    }

    # SSE — Server-Sent Events (rankings e estado do jogador)
    location ~ ^/api/users/(rankings|state)/subscribe {
        proxy_pass         http://urbanclash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_buffering off;
        proxy_cache     off;
        proxy_set_header X-Accel-Buffering no;
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;
    }

    # API REST
    location /api/ {
        proxy_pass         http://urbanclash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 5s;
        proxy_buffering on;
        proxy_buffer_size   4k;
        proxy_buffers       8 16k;
    }

    # Raiz / arquivos estáticos
    location / {
        proxy_pass         http://urbanclash_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    10s;
        proxy_connect_timeout 5s;
    }
}
