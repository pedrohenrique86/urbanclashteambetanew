name: Unified Deploy (Frontend & Backend)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite rodar manualmente se precisar

jobs:
  # --- DEPLOY DO BACKEND NA ORACLE ---
  deploy-backend:
    name: 🚀 Deploy Backend (Oracle VPS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into Oracle and Update Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/urbanclashteambetanew/backend
            git pull origin main
            npm install
            npm run migrate:up:prod
            pm2 restart urbanclash-api || pm2 start server.js --name "urbanclash-api"
            pm2 save

