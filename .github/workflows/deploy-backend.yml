name: Unified Deploy (Frontend & Backend)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # --- DEPLOY DO BACKEND NA ORACLE ---
  deploy-backend:
    name: 🚀 Deploy Backend (Oracle VPS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into Oracle and Update
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/urbanclashteambetanew
            git fetch origin
            git reset --hard origin/main
            cd backend
            npm install
            npm run migrate:up:prod || true
            pm2 restart urbanclash-api || pm2 start server.js --name "urbanclash-api"
            pm2 save

  # --- DEPLOY DO FRONTEND NO CLOUDFLARE ---
  deploy-frontend:
    name: 🌐 Deploy Frontend (Cloudflare)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build
        run: |
          npm install --prefix frontend
          npm run build --prefix frontend
        env:
          VITE_API_URL: https://api.urbanclashteam.com

      - name: Deploy to Cloudflare
        run: |
          cd frontend
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

