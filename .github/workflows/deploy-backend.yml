name: Unified Deploy (Frontend & Backend)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- DEPLOY DO BACKEND NA ORACLE ---
  deploy-backend:
    name: 🚀 Deploy Backend (Oracle VPS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: SSH into Oracle and Update
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/urbanclashteambetanew
            # SÊNIOR: Garante que o Redis do sistema esteja parado para não conflitar com o Docker
            sudo systemctl stop redis-server || true
            sudo systemctl disable redis-server || true

            # SÊNIOR: Sincroniza e sobe o Redis via Docker com as otimizações de performance
            git fetch origin
            git reset --hard origin/main
            docker-compose up -d redis

            # Cria pasta de logs se não existir
            mkdir -p backend/logs

            # Mata processos travados nas portas 3001 e 3002
            for PORT in 3001 3002; do
              PID=$(lsof -ti tcp:$PORT 2>/dev/null || true)
              if [ -n "$PID" ]; then
                echo "Matando processo $PID na porta $PORT"
                kill -9 $PID 2>/dev/null || true
                sleep 1
              fi
            done

            # Atualiza configuração do Nginx (porta 3001)
            sudo cp config/nginx/urbanclash.conf /etc/nginx/sites-available/urbanclash
            # Garante que o symlink em sites-enabled existe e aponta para o arquivo correto
            sudo ln -sf /etc/nginx/sites-available/urbanclash /etc/nginx/sites-enabled/urbanclash
            # Remove qualquer arquivo default que possa conflitar
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

            cd backend
            npm install --omit=dev
            # SÊNIOR: Verificações de saúde do Banco SQLite e Backup
            echo "🔍 Verificando integridade do SQLite e Litestream..."
            ls -lh ~/urbanclashteambetanew/*.db || echo "⚠️  Aviso: Arquivos .db não encontrados (serão criados no boot)"
            
            # Garante que o Litestream está rodando
            sudo systemctl restart litestream || echo "⚠️  Falha ao reiniciar Litestream"
            sudo systemctl is-active litestream || echo "❌ Litestream NÃO está rodando!"

            # Para instância anterior e reinicia com PM2 na porta 3001
            pm2 delete backend 2>/dev/null || true
            pm2 start server.js \
              --name "backend" \
              --node-args="--max-old-space-size=512" \
              --env NODE_ENV=production \
              --log ~/urbanclashteambetanew/backend/logs/pm2-combined.log \
              --error ~/urbanclashteambetanew/backend/logs/pm2-error.log \
              --output ~/urbanclashteambetanew/backend/logs/pm2-out.log \
              --time \
              --restart-delay=3000 \
              --max-restarts=10

            # Aguarda servidor subir e verifica saúde
            echo "⏳ Aguardando servidor iniciar..."
            sleep 5
            pm2 list
            if curl -sf http://localhost:3001/api/public/health > /dev/null 2>&1; then
              echo "✅ Backend respondendo na porta 3001"
            else
              echo "❌ Backend NÃO respondeu — Logs de erro:"
              pm2 logs backend --err --lines 30 --nostream || true
              echo "--- Últimas linhas do output ---"
              pm2 logs backend --out --lines 15 --nostream || true
            fi
            pm2 save

  # --- DEPLOY DO BACKEND NO GOOGLE CLOUD (RESERVA) ---
  deploy-backend-google:
    name: 🛡️ Deploy Backend (Google Cloud)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: SSH into Google and Update
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # Garante que as pastas básicas existem
            mkdir -p ~/urbanclashteambetanew
            cd ~/urbanclashteambetanew
            
            # Sincroniza o código
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            fi
            git fetch origin
            git reset --hard origin/main

            # Instala dependências básicas se não existirem
            sudo apt update && sudo apt install -y nginx lsof docker.io git docker-compose-v2 || true

            # Para o Redis do sistema e sobe via Docker
            sudo systemctl stop redis-server || true
            sudo systemctl disable redis-server || true
            docker compose up -d redis

            # Cria pasta de logs
            mkdir -p backend/logs

            # Mata processos nas portas 3001/3002
            for PORT in 3001 3002; do
              PID=$(lsof -ti tcp:$PORT 2>/dev/null || true)
              if [ -n "$PID" ]; then
                kill -9 $PID 2>/dev/null || true
              fi
            done

            # Nginx Config (Opcional, mas mantém paridade com Oracle)
            sudo cp config/nginx/urbanclash.conf /etc/nginx/sites-available/urbanclash || true
            sudo ln -sf /etc/nginx/sites-available/urbanclash /etc/nginx/sites-enabled/urbanclash || true
            sudo rm -f /etc/nginx/sites-enabled/default || true
            sudo nginx -t && sudo systemctl reload nginx || true

            cd backend
            npm install --omit=dev

            # Inicia com PM2 (Memória reduzida para o Google)
            pm2 delete backend 2>/dev/null || true
            pm2 start server.js \
              --name "backend" \
              --node-args="--max-old-space-size=256" \
              --env NODE_ENV=production \
              --log ~/urbanclashteambetanew/backend/logs/pm2-combined.log \
              --time
            pm2 save

  # --- DEPLOY DO FRONTEND NO CLOUDFLARE ---
  deploy-frontend:
    name: 🌐 Deploy Frontend (Cloudflare)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build
        env:
          VITE_API_URL: https://api.urbanclashteam.com

      - name: Deploy to Cloudflare
        run: |
          cd frontend
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

